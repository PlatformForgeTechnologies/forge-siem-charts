{{- if .Values.rbac.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-siem-agent
  labels:
    {{- include "agent.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: forge-siem-agent
  labels:
    {{- include "agent.labels" . | nindent 4 }}
rules:
  # Read pod metadata so the agent can attach Kubernetes context (namespace,
  # pod name, owner references, labels) to events it collects on each node.
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: forge-siem-agent
  labels:
    {{- include "agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: forge-siem-agent
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: forge-siem-agent
  apiGroup: rbac.authorization.k8s.io
{{- end }}
