apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: forge-siem-agent
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agent.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  updateStrategy:
    type: {{ .Values.updateStrategy.type }}
    {{- if eq .Values.updateStrategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ .Values.updateStrategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/enrollment-token: {{ .Values.enrollment.token | sha256sum }}
      labels:
        app.kubernetes.io/name: {{ include "agent.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: forge-siem-agent
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      hostPID: true
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: AGENT_CONFIG_PATH
              value: /etc/forge-siem-agent/agent.yaml
            - name: ENROLL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forge-agent-enrollment
                  key: enrollment-token
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: agent-config
              mountPath: /etc/forge-siem-agent
              readOnly: true
            - name: agent-data
              mountPath: /var/lib/forge-siem-agent
            {{- if .Values.hostPaths.varLog.enabled }}
            - name: host-var-log
              mountPath: /host/var/log
              readOnly: true
            {{- end }}
            - name: host-docker-logs
              mountPath: /host/var/lib/docker/containers
              readOnly: true
            {{- if .Values.hostPaths.proc.enabled }}
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            {{- end }}
            {{- if .Values.hostPaths.containerSocket.enabled }}
            - name: container-socket
              mountPath: /run/containerd/containerd.sock
            {{- end }}
      volumes:
        - name: agent-config
          configMap:
            name: {{ include "agent.fullname" . }}-config
        {{- if .Values.hostPaths.varLog.enabled }}
        - name: host-var-log
          hostPath:
            path: {{ .Values.hostPaths.varLog.hostPath }}
            type: Directory
        {{- end }}
        - name: host-docker-logs
          hostPath:
            path: /var/lib/docker/containers
            type: DirectoryOrCreate
        {{- if .Values.hostPaths.proc.enabled }}
        - name: host-proc
          hostPath:
            path: {{ .Values.hostPaths.proc.hostPath }}
            type: Directory
        {{- end }}
        {{- if .Values.hostPaths.containerSocket.enabled }}
        - name: container-socket
          hostPath:
            path: {{ .Values.hostPaths.containerSocket.hostPath }}
            type: Socket
        {{- end }}
        - name: agent-data
          hostPath:
            path: /var/lib/forge-siem-agent
            type: DirectoryOrCreate
