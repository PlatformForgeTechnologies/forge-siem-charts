apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-relay
spec:
  replicas: {{ .Values.relay.replicas }}
  selector:
    matchLabels:
      app: forge-relay
  template:
    metadata:
      labels:
        app: forge-relay
    spec:
      containers:
        - name: relay
          image: {{ .Values.image.registry }}/forge-siem-relay:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The relay dials OUT to Forge — no ports exposed, no inbound connections.
          env:
            - name: RELAY_TENANT_ID
              value: {{ .Values.forge.tenantID | quote }}
            - name: RELAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: forge-byoc-secrets
                  key: relay-api-key
            {{- if .Values.forge.controlURL }}
            - name: RELAY_CONTROL_URL
              value: {{ .Values.forge.controlURL | quote }}
            {{- end }}
            - name: RELAY_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: forge-byoc-secrets
                  key: pg-dsn
            - name: RELAY_CLICKHOUSE_ADDR
              valueFrom:
                secretKeyRef:
                  name: forge-byoc-secrets
                  key: clickhouse-addr
            - name: RELAY_CLICKHOUSE_DB
              value: {{ .Values.dependencies.clickhouse.database | quote }}
            - name: RELAY_CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: forge-byoc-secrets
                  key: clickhouse-user
            - name: RELAY_CLICKHOUSE_PASS
              valueFrom:
                secretKeyRef:
                  name: forge-byoc-secrets
                  key: clickhouse-pass
          livenessProbe:
            exec:
              # Relay is healthy if the process is running; no HTTP port to probe.
              command: ["sh", "-c", "kill -0 1"]
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.relay.resources | nindent 12 }}
