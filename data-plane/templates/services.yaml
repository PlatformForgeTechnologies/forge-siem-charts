spec:
  replicas: {{ .Values.decoder.replicas }}
  selector:
    matchLabels:
      app: forge-decoder
  template:
    metadata:
      labels:
        app: forge-decoder
    spec:
      containers:
        - name: decoder
          image: {{ .Values.image.registry }}/forge-siem-decoder:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- include "byoc.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.decoder.resources | nindent 12 }}
---
