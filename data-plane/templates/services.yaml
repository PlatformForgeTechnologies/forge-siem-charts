{{- $common := dict "Values" .Values "Release" .Release "Chart" .Chart -}}
---
# ── Ingest ────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-ingest
spec:
  replicas: {{ .Values.ingest.replicas }}
  selector:
    matchLabels:
      app: forge-ingest
  template:
    metadata:
      labels:
        app: forge-ingest
    spec:
      containers:
        - name: ingest
          image: {{ .Values.image.registry }}/forge-siem-ingest:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 1514
              name: mtls
          env:
            {{- include "byoc.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.ingest.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: forge-ingest
spec:
  type: {{ .Values.ingest.service.type }}
  selector:
    app: forge-ingest
  ports:
    - port: {{ .Values.ingest.service.port }}
      targetPort: 1514
      name: mtls
---
# ── Decoder ───────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
