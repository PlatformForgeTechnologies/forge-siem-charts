# Forge SIEM BYOC Data Plane — values.yaml
# ──────────────────────────────────────────────────────────────────────────────
# Deploy this chart in your own Kubernetes cluster after completing the
# "Connect data plane" step in the Forge admin center for your tenant.
#
# Required: forge.tenantID, forge.relayAPIKey, and all dependencies.*

forge:
  # Tenant ID from the Forge admin center (Settings → Tenant)
  tenantID: ""
  # API key generated in Admin → Tenants → <your tenant> → Data Plane → Generate Key
  # Shown once at generation time — store it in your secrets manager.
  relayAPIKey: ""
  # Optional: override the Forge control plane WebSocket URL.
  # Leave empty to use the default (wss://api.platformforgegroup.com).
  controlURL: ""

image:
  registry: apanisile
  tag: latest
  pullPolicy: IfNotPresent

# ── External dependencies (you provide) ───────────────────────────────────────
dependencies:
  postgres:
    # Full DSN for your PostgreSQL instance (RDS, Cloud SQL, Supabase, etc.)
    dsn: "postgres://forge:password@your-rds-endpoint:5432/forge_siem?sslmode=require"
  redis:
    # Redis address (ElastiCache, Upstash, Redis Cloud, etc.)
    addr: "your-redis-endpoint:6379"
    password: ""
    db: 0
  clickhouse:
    # ClickHouse endpoint (ClickHouse Cloud, Altinity, or self-hosted)
    addr: "your-clickhouse-host:9000"
    database: forge_siem
    username: default
    password: ""

# ── Relay ──────────────────────────────────────────────────────────────────────
# The relay dials OUT to Forge — it does not listen for inbound connections.
# No LoadBalancer, no open ports, no firewall rules required.
relay:
  replicas: 2
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }

# ── Data plane services ────────────────────────────────────────────────────────
ingest:
  replicas: 2
  service:
    type: LoadBalancer
    port: 1514
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

decoder:
  replicas: 2
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

rawArchiver:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }

rulesEngine:
  replicas: 2
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

alertIndexer:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }
